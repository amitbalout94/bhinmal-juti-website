<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock - Multiple Timezones</title>
<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

header {
  background: rgba(0, 0, 0, 0.3);
  color: white;
  padding: 20px;
  text-align: center;
  border-radius: 10px;
  margin-bottom: 30px;
}

header h1 {
  margin: 0;
  font-size: 32px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

.controls button, .controls select {
  padding: 10px 20px;
  font-size: 14px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  background: white;
  color: #333;
  font-weight: bold;
  transition: 0.3s;
}

.controls button:hover {
  background: #f0f0f0;
}

.format-toggle {
  background: #667eea;
  color: white;
}

.format-toggle:hover {
  background: #5568d3;
}

.add-timezone {
  background: #48bb78;
  color: white;
}

.add-timezone:hover {
  background: #38a169;
}

.reset-btn {
  background: #f56565;
  color: white;
}

.reset-btn:hover {
  background: #e53e3e;
}

.clocks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.clock-card {
  background: white;
  border-radius: 15px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  text-align: center;
  animation: slideIn 0.5s ease-out;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.clock-card .timezone-name {
  font-size: 20px;
  font-weight: bold;
  color: #667eea;
  margin-bottom: 15px;
}

.clock-card .date-display {
  font-size: 14px;
  color: #666;
  margin-bottom: 10px;
}

.clock-card .time-display {
  font-size: 48px;
  font-weight: bold;
  color: #333;
  font-family: 'Courier New', monospace;
  margin: 20px 0;
}

.clock-card .day-display {
  font-size: 14px;
  color: #888;
  margin-bottom: 15px;
}

.remove-btn {
  padding: 8px 15px;
  background: #f56565;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  transition: 0.3s;
}

.remove-btn:hover {
  background: #e53e3e;
}

select {
  padding: 10px 15px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
}

.modal-content {
  background-color: white;
  margin: 5% auto;
  padding: 30px;
  border-radius: 10px;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.modal-content h2 {
  margin-top: 0;
  color: #333;
}

.modal-content select {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 14px;
}

.modal-content button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.modal-content button:hover {
  background: #5568d3;
}

.close-modal {
  background: #f56565 !important;
}

.close-modal:hover {
  background: #e53e3e !important;
}

@media (max-width: 768px) {
  .clocks-grid {
    grid-template-columns: 1fr;
  }
  
  .controls {
    flex-direction: column;
  }
  
  .controls button, .controls select {
    width: 100%;
  }
  
  header h1 {
    font-size: 24px;
  }
}
</style>
</head>
<body>

<header>
  <h1>⏰ World Clock</h1>
  <p>Display time in multiple timezones around the world</p>
</header>

<div class="container">
  <div class="controls">
    <button class="format-toggle" onclick="toggleFormat()">🔄 Toggle 12/24 Hour</button>
    <button class="add-timezone" onclick="openModal()">➕ Add Timezone</button>
    <button class="reset-btn" onclick="resetClocks()">🔁 Reset</button>
  </div>

  <div class="clocks-grid" id="clocks"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>Add Timezone</h2>
    <select id="timezoneSelect">
      <option value="">Select a timezone...</option>
      <option value="America/New_York">🗽 New York (EST)</option>
      <option value="America/Chicago">Chicago (CST)</option>
      <option value="America/Denver">Denver (MST)</option>
      <option value="America/Los_Angeles">🌴 Los Angeles (PST)</option>
      <option value="Europe/London">🇬🇧 London (GMT)</option>
      <option value="Europe/Paris">🇫🇷 Paris (CET)</option>
      <option value="Europe/Berlin">🇩🇪 Berlin (CET)</option>
      <option value="Asia/Tokyo">🗾 Tokyo (JST)</option>
      <option value="Asia/Shanghai">🇨🇳 Shanghai (CST)</option>
      <option value="Asia/Hong_Kong">Hong Kong (HKT)</option>
      <option value="Australia/Sydney">🦘 Sydney (AEDT)</option>
      <option value="Asia/Dubai">🇦🇪 Dubai (GST)</option>
      <option value="Asia/Kolkata">🇮🇳 India (IST)</option>
      <option value="America/Toronto">🇨🇦 Toronto (EST)</option>
      <option value="America/Mexico_City">🇲🇽 Mexico City (CST)</option>
      <option value="America/Sao_Paulo">🇧🇷 Sao Paulo (BRT)</option>
      <option value="Africa/Cairo">🇪🇬 Cairo (EET)</option>
      <option value="Africa/Johannesburg">🇿🇦 Johannesburg (SAST)</option>
      <option value="Asia/Bangkok">🇹🇭 Bangkok (ICT)</option>
      <option value="Asia/Singapore">🇸🇬 Singapore (SGT)</option>
      <option value="Pacific/Auckland">🇳🇿 Auckland (NZDT)</option>
      <option value="Europe/Moscow">🇷🇺 Moscow (MSK)</option>
      <option value="America/Anchorage">Anchorage (AKST)</option>
      <option value="Pacific/Honolulu">Honolulu (HST)</option>
      <option value="Asia/Istanbul">🇹🇷 Istanbul (EET)</option>
      <option value="Asia/Karachi">🇵🇰 Karachi (PKT)</option>
      <option value="America/Buenos_Aires">🇦🇷 Buenos Aires (ART)</option>
      <option value="Africa/Lagos">🇳🇬 Lagos (WAT)</option>
      <option value="Asia/Bangkok">Bangkok (ICT)</option>
    </select>
    <button onclick="addTimezone()">✅ Add</button>
    <button class="close-modal" onclick="closeModal()">❌ Cancel</button>
  </div>
</div>

<script>
const DEFAULT_TIMEZONES = [
  'America/New_York',
  'Europe/London',
  'Asia/Tokyo',
  'Australia/Sydney',
  'Asia/Dubai',
  'Asia/Kolkata'
];

let is24HourFormat = false;
let timezones = [];

function init() {
  const saved = localStorage.getItem('timezones');
  if (saved) {
    timezones = JSON.parse(saved);
  } else {
    timezones = DEFAULT_TIMEZONES;
  }
  
  const savedFormat = localStorage.getItem('is24HourFormat');
  if (savedFormat) {
    is24HourFormat = JSON.parse(savedFormat);
  }
  
  render();
  setInterval(render, 1000);
}

function render() {
  const container = document.getElementById('clocks');
  container.innerHTML = '';
  
  timezones.forEach(tz => {
    const card = createClockCard(tz);
    container.appendChild(card);
  });
}

function createClockCard(timezone) {
  const card = document.createElement('div');
  card.className = 'clock-card';
  
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    timeZone: timezone,
    hour: is24HourFormat ? '2-digit' : 'numeric',
    minute: '2-digit',
    second: '2-digit',
    hour12: !is24HourFormat
  });
  
  const dateFormatter = new Intl.DateTimeFormat('en-US', {
    timeZone: timezone,
    year: 'numeric',
    month: 'short',
    day: 'numeric'
  });
  
  const dayFormatter = new Intl.DateTimeFormat('en-US', {
    timeZone: timezone,
    weekday: 'long'
  });
  
  const time = formatter.format(now);
  const date = dateFormatter.format(now);
  const day = dayFormatter.format(now);
  
  const tzName = timezone.replace('_', ' ').split('/').pop();
  
  card.innerHTML = `
    <div class="timezone-name">${timezone}</div>
    <div class="date-display">${date}</div>
    <div class="time-display">${time}</div>
    <div class="day-display">${day}</div>
    <button class="remove-btn" onclick="removeTimezone('${timezone}')">🗑️ Remove</button>
  `;
  
  return card;
}

function toggleFormat() {
  is24HourFormat = !is24HourFormat;
  localStorage.setItem('is24HourFormat', JSON.stringify(is24HourFormat));
  render();
}

function openModal() {
  document.getElementById('modal').style.display = 'block';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function addTimezone() {
  const select = document.getElementById('timezoneSelect');
  const tz = select.value;
  
  if (!tz) {
    alert('Please select a timezone');
    return;
  }
  
  if (timezones.includes(tz)) {
    alert('This timezone is already added');
    return;
  }
  
  timezones.push(tz);
  localStorage.setItem('timezones', JSON.stringify(timezones));
  closeModal();
  render();
}

function removeTimezone(tz) {
  timezones = timezones.filter(t => t !== tz);
  localStorage.setItem('timezones', JSON.stringify(timezones));
  render();
}

function resetClocks() {
  timezones = DEFAULT_TIMEZONES;
  localStorage.setItem('timezones', JSON.stringify(timezones));
  render();
}

window.onclick = function(event) {
  const modal = document.getElementById('modal');
  if (event.target === modal) {
    modal.style.display = 'none';
  }
}

init();
</script>

</body>
</html>
